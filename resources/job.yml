resources:
  jobs:
    colibri_wind_pipeline:
      name: "[${bundle.target}] Colibri Wind Turbine Pipeline"
      description: "Ingests turbine telemetry, validates measurements, and builds daily operational outputs."
      max_concurrent_runs: 1
      timeout_seconds: 3600
      performance_target: STANDARD
      queue:
        enabled: true

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: bronze_schema
          default: ${var.bronze_schema}
        - name: silver_schema
          default: ${var.silver_schema}
        - name: gold_schema
          default: ${var.gold_schema}
        - name: raw_path
          default: /Volumes/${var.catalog}/${var.bronze_schema}/${var.raw_volume}/raw
        - name: checkpoint_path
          default: /Volumes/${var.catalog}/${var.bronze_schema}/${var.checkpoint_volume}
        - name: run_id
          default: "{{job.run_id}}"
        - name: total_turbines
          default: "15"
        - name: turbines_per_file
          default: "5"
        - name: window_hours
          default: "24"
        - name: anomaly_sigma
          default: "2.0"

      tasks:
        - task_key: ingest_bronze
          notebook_task:
            notebook_path: ../notebooks/jobs/01_ingest_bronze.py

        - task_key: build_silver
          depends_on:
            - task_key: ingest_bronze
          notebook_task:
            notebook_path: ../notebooks/jobs/02_build_silver.py

        - task_key: build_gold
          depends_on:
            - task_key: build_silver
          notebook_task:
            notebook_path: ../notebooks/jobs/03_build_gold.py
